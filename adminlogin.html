<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - AainKanun AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { 50: '#eff6ff', 500: '#3b82f6', 600: '#2563eb', 900: '#1e3a8a', 950: '#172554' } } } } }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 h-screen flex items-center justify-center p-4">

    <div id="login-box" class="bg-white p-8 rounded-2xl shadow-lg max-w-md w-full transition-all">
        <div class="flex justify-center mb-6">
            <div class="w-16 h-16 bg-brand-50 rounded-full flex items-center justify-center border border-brand-100"><i data-lucide="lock" class="w-8 h-8 text-brand-600"></i></div>
        </div>
        <h2 class="text-2xl font-bold text-center text-brand-950 mb-2">অ্যাডমিন লগইন</h2>
        <p class="text-center text-gray-500 mb-6 text-sm">পাসওয়ার্ড: admin123</p>
        
        <input type="password" id="admin-pass" placeholder="পাসওয়ার্ড দিন..." class="w-full px-4 py-3 border border-gray-300 rounded-xl mb-4 focus:ring-2 focus:ring-brand-500 outline-none">
        <button onclick="checkLogin()" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-medium py-3 rounded-xl">লগইন করুন</button>
        <p id="error-msg" class="text-red-500 text-sm text-center mt-3 hidden">পাসওয়ার্ড ভুল হয়েছে!</p>
    </div>

    <div id="dashboard" class="hidden bg-white p-8 rounded-2xl shadow-lg max-w-2xl w-full">
        <div class="flex items-center justify-between mb-8 border-b pb-4">
            <div><h2 class="text-2xl font-bold text-brand-950">ডেটাবেস কন্ট্রোল প্যানেল</h2><p class="text-gray-500 text-sm">সংবিধান বা আইনের PDF আপলোড করুন</p></div>
            <i data-lucide="database" class="w-8 h-8 text-brand-600"></i>
        </div>

        <form id="upload-form" class="space-y-6">
            <div class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center">
                <i data-lucide="file-text" class="w-12 h-12 text-gray-400 mx-auto mb-3"></i>
                <input type="file" id="pdf-file" accept=".pdf" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-brand-50 file:text-brand-700 hover:file:bg-brand-100 cursor-pointer">
            </div>
            <button type="submit" id="upload-btn" class="w-full bg-brand-950 hover:bg-brand-900 text-white font-medium py-4 rounded-xl flex justify-center items-center gap-2">
                <i data-lucide="upload-cloud" class="w-5 h-5"></i> আপলোড ও ভেক্টরাইজ করুন
            </button>
        </form>

        <div id="status-box" class="mt-6 p-4 rounded-xl bg-gray-50 border border-gray-200 hidden">
            <p id="status-text" class="text-sm font-medium text-brand-900 flex items-center gap-2"></p>
        </div>
        <div class="mt-6 text-center"><a href="/" class="text-brand-600 text-sm hover:underline">← মূল ওয়েবসাইটে ফিরে যান</a></div>
    </div>

    <script>
        lucide.createIcons();
        function checkLogin() {
            if(document.getElementById('admin-pass').value === 'admin123') {
                document.getElementById('login-box').classList.add('hidden'); document.getElementById('dashboard').classList.remove('hidden');
            } else { document.getElementById('error-msg').classList.remove('hidden'); }
        }

        document.getElementById('upload-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('pdf-file');
            if (fileInput.files.length === 0) return alert("দয়া করে PDF নির্বাচন করুন!");

            const statusBox = document.getElementById('status-box'), statusText = document.getElementById('status-text'), uploadBtn = document.getElementById('upload-btn');
            statusBox.classList.remove('hidden');
            statusText.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> ভেক্টরাইজেশন চলছে, অপেক্ষা করুন (এতে ২-৩ মিনিট লাগতে পারে)...';
            uploadBtn.disabled = true; uploadBtn.classList.add('opacity-50'); lucide.createIcons();

            const formData = new FormData(); formData.append('file', fileInput.files[0]);

            try {
                const response = await fetch('/api/upload', { method: 'POST', body: formData });
                const result = await response.json();
                
                if(response.ok) {
                    statusText.innerHTML = '<i data-lucide="check-circle" class="w-5 h-5 text-green-500"></i> সফল! (' + result.chunks + ' টি চাঙ্ক)';
                    statusText.classList.replace('text-brand-900', 'text-green-700'); fileInput.value = "";
                } else throw new Error(result.error);
            } catch (error) {
                statusText.innerHTML = '<i data-lucide="alert-circle" class="w-5 h-5 text-red-500"></i> ত্রুটি: ' + error.message;
            } finally {
                uploadBtn.disabled = false; uploadBtn.classList.remove('opacity-50'); lucide.createIcons();
            }
        });
    </script>
</body>
</html>
